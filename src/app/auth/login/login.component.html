<div class="min-h-dvh flex flex-col bg-white">
  <!-- Hero -->
  <div class="relative flex-1 flex flex-col items-center justify-center px-6 pt-16 pb-8 overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-[#F05A28]/10 via-[#e328f0]/10 to-purple-100 pointer-events-none"></div>

    <div class="relative z-10 flex flex-col items-center text-center mb-10">
      <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-[#F05A28] to-[#e328f0] flex items-center justify-center shadow-lg mb-4">
        <span class="text-4xl">✨</span>
      </div>
      <h1 class="text-3xl font-bold text-[#1A2744]">Genzyy</h1>
      <p class="text-gray-500 mt-1 text-sm">Find your perfect match</p>
    </div>

    <!-- Phone step -->
    @if (step() === 'phone') {
      <div class="relative z-10 w-full max-w-sm">
        <p class="text-center text-[#1A2744] font-semibold mb-6">Enter your mobile number</p>

        <div class="flex rounded-2xl border-2 border-gray-200 focus-within:border-[#e328f0] overflow-hidden bg-white transition-colors">
          <span class="px-4 py-4 text-gray-500 font-medium bg-gray-50 border-r border-gray-200 text-sm">+91</span>
          <input #phoneInput type="tel" inputmode="numeric" maxlength="10"
            [(ngModel)]="phone" placeholder="10-digit mobile number"
            class="flex-1 px-4 py-4 outline-none text-[#1A2744] font-medium text-base"
            (keydown.enter)="sendOTP()" />
        </div>

        @if (error()) {
          <p class="text-red-500 text-sm mt-2 text-center">{{ error() }}</p>
        }

        <button (click)="sendOTP()" [disabled]="loading()"
          class="w-full mt-4 py-4 rounded-2xl bg-gradient-to-r from-[#F05A28] to-[#e328f0] text-white font-semibold text-base shadow-lg disabled:opacity-60 active:scale-95 transition-transform">
          @if (loading()) { Sending… } @else { Get OTP }
        </button>

        <p class="text-center text-xs text-gray-400 mt-4">
          By continuing, you agree to our Terms &amp; Privacy Policy
        </p>
      </div>
    }

    <!-- OTP step -->
    @if (step() === 'otp') {
      <div class="relative z-10 w-full max-w-sm">
        <p class="text-center text-[#1A2744] font-semibold mb-1">Enter OTP</p>
        <p class="text-center text-gray-500 text-sm mb-6">Sent to +91 {{ phone }}</p>

        <input type="tel" inputmode="numeric" maxlength="6"
          [(ngModel)]="otp" placeholder="6-digit OTP"
          class="w-full px-4 py-4 rounded-2xl border-2 border-gray-200 focus:border-[#e328f0] outline-none text-center text-[#1A2744] font-bold text-2xl tracking-[0.4em] transition-colors"
          (keydown.enter)="verifyOTP()" />

        @if (error()) {
          <p class="text-red-500 text-sm mt-2 text-center">{{ error() }}</p>
        }

        <button (click)="verifyOTP()" [disabled]="loading()"
          class="w-full mt-4 py-4 rounded-2xl bg-gradient-to-r from-[#F05A28] to-[#e328f0] text-white font-semibold text-base shadow-lg disabled:opacity-60 active:scale-95 transition-transform">
          @if (loading()) { Verifying… } @else { Verify & Continue }
        </button>

        <button (click)="step.set('phone'); error.set('')"
          class="w-full mt-3 py-3 text-gray-500 text-sm">
          ← Change number
        </button>
      </div>
    }
  </div>
</div>
