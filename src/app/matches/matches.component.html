<div class="flex flex-col h-full">
  <!-- Header -->
  <div class="px-4 pt-4 pb-3 bg-white border-b border-gray-100">
    <h1 class="text-xl font-bold text-[#1A2744]">Messages</h1>
  </div>

  <div class="flex-1 overflow-y-auto">
    <div class="px-4 py-3">

      @if (loading()) {
        @for (s of [1,2,3,4]; track s) {
          <div class="flex items-center gap-3 mb-4">
            <div class="w-14 h-14 rounded-2xl bg-gray-200 animate-pulse shrink-0"></div>
            <div class="flex-1">
              <div class="h-4 bg-gray-200 rounded w-24 mb-2 animate-pulse"></div>
              <div class="h-3 bg-gray-100 rounded w-40 animate-pulse"></div>
            </div>
          </div>
        }
      } @else if (matches().length === 0) {
        <div class="flex flex-col items-center py-10 text-center">
          <svg class="w-14 h-14 mb-3 text-[#e328f0]" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
          <h3 class="font-semibold text-[#1A2744] mb-1">No matches yet</h3>
          <p class="text-sm text-gray-500">Keep swiping to find your match!</p>
        </div>
      } @else {
        @for (match of matches(); track match.id) {
          <button class="flex items-center gap-3 w-full mb-3 text-left"
            (click)="openChat(match)">
            <div class="relative shrink-0">
              <div class="w-14 h-14 rounded-2xl overflow-hidden bg-gray-200">
                @if (match.profile.photos[0]) {
                  <img [src]="match.profile.photos[0] | imageUrl:'thumb'" class="w-full h-full object-cover" />
                } @else {
                  <div class="w-full h-full flex items-center justify-center">
                    <svg class="w-7 h-7 text-gray-400" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                  </div>
                }
              </div>
              @if (match.unreadCount > 0) {
                <span class="absolute -top-1 -right-1 w-5 h-5 bg-[#e328f0] text-white text-[10px] font-bold rounded-full flex items-center justify-center">
                  {{ match.unreadCount > 9 ? '9+' : match.unreadCount }}
                </span>
              }
              @if (match.profile.isVerified) {
                <span class="absolute -bottom-1 -right-1 w-5 h-5 bg-blue-500 rounded-full flex items-center justify-center">
                  <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                  </svg>
                </span>
              }
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between">
                <span class="font-semibold text-[#1A2744] text-sm">{{ match.profile.name }}</span>
                @if (match.lastMessage) {
                  <span class="text-xs text-gray-400">{{ timeAgo(match.lastMessage.createdAt) }}</span>
                }
              </div>
              @if (match.lastMessage) {
                <p class="text-sm text-gray-500 truncate mt-0.5"
                  [class.font-semibold]="match.unreadCount > 0"
                  [class.text-[#1A2744]]="match.unreadCount > 0">
                  @if (match.lastMessage.type === 'voice') {
                    <span class="inline-flex items-center gap-1">
                      <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                      </svg>
                      Voice message
                    </span>
                  }
                  @else { {{ match.lastMessage.content }} }
                </p>
              } @else {
                <p class="text-sm text-[#e328f0] mt-0.5 flex items-center gap-1">
                  Say hello!
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M7 11.5V14m0-2.5v-6a1.5 1.5 0 113 0m-3 6a1.5 1.5 0 00-3 0v2a7.5 7.5 0 0015 0v-5a1.5 1.5 0 00-3 0m-6-3V11m0-5.5v-1a1.5 1.5 0 013 0v1m0 0V11m0-5.5a1.5 1.5 0 013 0v3m0 0V11"/>
                  </svg>
                </p>
              }
            </div>
          </button>
        }
      }
    </div>
  </div>
</div>
